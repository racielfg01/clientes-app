version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: clientes_db
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-clientes_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - clientes_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: clientes_backend
    environment:
      DB_HOST: postgres
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-clientes_db}
      DB_PORT: 5432
      JWT_SECRET: ${JWT_SECRET:-super-secret-key-change-in-production}
      PORT: 5000
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - clientes_network
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: clientes_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - clientes_network
    environment:
      REACT_APP_API_URL: http://localhost:5000/api
    restart: unless-stopped

networks:
  clientes_network:
    driver: bridge

volumes:
  postgres_data: