services:
  # Base de datos PostgreSQL
  - type: pserv
    name: clientes-db
    plan: free
    region: oregon

  # Servicio web (backend + frontend)
  - type: web
    name: clientes-app
    runtime: image
    plan: free
    region: oregon
    dockerfilePath: ./Dockerfile
    repo: https://github.com/racielfg01/clientes-app
    branch: main
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: clientes-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
    healthCheckPath: /health
    autoDeploy: true
