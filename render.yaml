services:
  # Servicio de base de datos PostgreSQL
  - type: pserv
    name: clientes-db
    plan: free
    region: oregon
    
  # Servicio backend
  - type: web
    name: clientes-backend
    runtime: image
    plan: free
    region: oregon
    dockerfilePath: ./backend/Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: clientes-db
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        fromService:
          name: clientes-frontend
          type: web
          property: url
    healthCheckPath: /health
    autoDeploy: true
    
  # Servicio frontend
  - type: web
    name: clientes-frontend
    runtime: image
    plan: free
    region: oregon
    dockerfilePath: ./frontend/Dockerfile
    envVars:
      - key: REACT_APP_API_URL
        fromService:
          name: clientes-backend
          type: web
          property: url
          value: /api
    healthCheckPath: /
    autoDeploy: true