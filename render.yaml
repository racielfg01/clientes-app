services:
  # Base de datos PostgreSQL
  - type: pserv
    name: clientes-db
    plan: free
    region: oregon

  # Backend API
  - type: web
    name: clientes-backend
    runtime: image
    plan: free
    region: oregon
    dockerfilePath: ./backend/Dockerfile
    repo: https://github.com/racielfg01/clientes-app
    branch: main
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: clientes-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
    healthCheckPath: /health

  # Frontend
  - type: web
    name: clientes-frontend
    runtime: image
    plan: free
    region: oregon
    dockerfilePath: ./frontend/Dockerfile
    repo: https://github.com/racielfg01/clientes-app
    branch: main
    envVars:
      - key: REACT_APP_API_URL
        value: https://clientes-backend.onrender.com/api
    healthCheckPath: /